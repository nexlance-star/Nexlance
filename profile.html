<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexlance Profile</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      width: 350px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }
    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      padding: 10px 20px;
      background: #06b6d4;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h2>Nexlance - Freelancer Profile</h2>
</header>

<div class="container">
  <img src="https://via.placeholder.com/100" alt="Profile Picture">

  <h3>Your Profile</h3>

  <input type="text" placeholder="Your Name"><br>
  <input type="text" placeholder="Your Skill (e.g., Web Developer)"><br>
  <textarea placeholder="About You"></textarea><br>

  <button onclick="saveProfile()">Save Profile</button>
</div>

<script>
function saveProfile() {
  alert("Profile Saved Successfully (Demo)");
}
</script>

</body>
</html>
