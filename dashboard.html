<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexlance Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f9;
    }
    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      width: 90%;
      max-width: 800px;
      margin: 30px auto;
    }
    .card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h3 {
      margin-top: 0;
    }
  </style>
</head>
<body>

<header>
  <h2>Nexlance Dashboard</h2>
</header>

<div class="container">

  <div class="card">
    <h3>👤 Profile</h3>
    <p>Name: User</p>
    <p>Skill: Web Developer</p>
  </div>

  <div class="card">
    <h3>📄 My Jobs</h3>
    <p>Logo Design Project</p>
    <p>Website Development</p>
  </div>

  <div class="card">
    <h3>📊 Status</h3>
    <p>Active Projects: 2</p>
    <p>Completed: 5</p>
  </div>

</div>

</body>
</html>
