<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nexlance Jobs</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .job-container {
      width: 90%;
      max-width: 600px;
      margin: 30px auto;
    }
    .job-card {
      background: white;
      padding: 20px;
      margin: 15px 0;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 8px 15px;
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<header>
  <h2>Nexlance - Available Jobs</h2>
</header>

<div class="job-container">

  <div class="job-card">
    <h3>Logo Designer Needed</h3>
    <p>Looking for a creative logo designer for startup.</p>
    <p><strong>Budget:</strong> ₹1000</p>
    <button onclick="apply()">Apply</button>
  </div>

  <div class="job-card">
    <h3>Website Developer</h3>
    <p>Need a simple business website using HTML & CSS.</p>
    <p><strong>Budget:</strong> ₹3000</p>
    <button onclick="apply()">Apply</button>
  </div>

  <div class="job-card">
    <h3>Content Writer</h3>
    <p>Write blog articles (500 words each).</p>
    <p><strong>Budget:</strong> ₹500</p>
    <button onclick="apply()">Apply</button>
  </div>

</div>

<script>
function apply() {
  alert("Application Submitted (Demo)");
}
</script>

</body>
</html>
