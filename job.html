<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post a Job - Nexlance</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #111827;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      width: 350px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h2>Nexlance - Post a Job</h2>
</header>

<div class="container">
  <h3>Post Your Job</h3>

  <input type="text" placeholder="Job Title"><br>
  <textarea placeholder="Job Description"></textarea><br>
  <input type="text" placeholder="Budget"><br>

  <button onclick="postJob()">Post Job</button>

<script>
function postJob() {
  alert("Job Posted Successfully!");
  window.location.href = "jobs.html";
}
</script>
</div>

<script>
function postJob() {
  alert("Job Posted Successfully (Demo)");
}
</script>

</body>
</html>
